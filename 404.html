<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Lost in Luxury | Seven Star Perfume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --gold: #d4a853;
            --gold-light: #e5c07b;
            --text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 2rem;
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            margin-bottom: 2rem;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 168, 83, 0.4); }
            70% { box-shadow: 0 0 20px 10px rgba(212, 168, 83, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 168, 83, 0); }
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin: 0;
            color: var(--gold);
            letter-spacing: 4px;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin: 1.5rem 0 2.5rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--gold);
            color: #000;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:hover {
            background: var(--gold-light);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="Seven Star" class="logo">
        <h1>404</h1>
        <p>Lost in the world of fragrances? The page you are looking for has vanished into thin air.</p>
        <a href="index.html" class="btn">Back to Collection</a>
    </div>
</body>
</html>
